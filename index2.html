  <div class="box">
    <h1>Editable Text Config</h1>
    <p>Semua tulisan utama website customer 3 ada dalam <code>app2.js</code>.</p>

    <p><code>window.NUMO_ADMIN_CONFIG.ADMIN_TELEGRAM_USERNAME</code></p>
